syntax = "proto3";

import "google/protobuf/timestamp.proto";

package productsPackage;

service Products {
    rpc getProduct(productId) returns (productItem);
    rpc getProducts(productIds) returns (productItems);
}
service AdminProduct {
  rpc createProducts(CreateParams) returns (Product);
  rpc updateProduct(UpdateParams) returns (Product);
  rpc archiveProduct(productId) returns (archiveResponse);
  rpc unarchiveProduct(productId) returns (archiveResponse);
  rpc createCategory(categoryParams) returns (Category);
}

message categoryParams {
  string name = 1;
  string description = 2;
}


message archiveResponse {
  bool success = 1;
  
}
message  productId {
    string id = 1;
}

message productIds {
    repeated productId ids = 1;
}
message productItem {
    string id = 1;
    string name = 2;
    string category_id = 3;
    string description = 4;
    float  price = 5;
    string sku = 6;
    
};

message productItems {
  repeated productItem items = 1;
}

message CreateParams {
  string name = 1;
  string category_id = 2;
  string description = 3;
  int64  price = 4;
  string sku = 5;
}

message UpdateParams {
  string product_id = 1;
  optional string name = 2;
  optional string category_id = 3;
  optional string description = 4;
  optional int64 price = 5;
  optional string sku = 6;

}

message Product {
    string id = 1;
    string name = 2;
    string category_id = 3;
    string description = 4;
    int64 price = 5;
    string sku = 6;
    string created_at = 7;
    string updated_at = 8;
}

message Category {
  string id = 1;
  string name = 2;
  string description = 3;
}